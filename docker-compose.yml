services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: caas-postgres
    environment:
      POSTGRES_DB: caas
      POSTGRES_USER: caas
      POSTGRES_PASSWORD: caas
    ports:
      - "5432:5432"
    volumes:
      - caas-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caas -d caas"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  caas-pgdata:
